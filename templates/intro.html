<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PELISXMAX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/intro.css') }}">
</head>
<body>

  <!-- Pantalla de inicio → clic para arrancar -->
<div id="pantalla-inicio" onclick="iniciarIntro()" style="
  position: fixed;
  inset: 0;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: #050505;">
  <h1 style="color:#ff4d00; font-size:3rem; letter-spacing:8px; margin:0;">PELISXMAX</h1>
  <p style="color:#555; font-size:1rem; margin-top:16px; letter-spacing:3px;">TOCA PARA CONTINUAR</p>
</div>

  <!-- Canvas de partículas -->
  <canvas id="canvas"></canvas>

  <!-- Capa de explosión -->
  <div id="explosion"></div>

  <!-- Flash de impacto -->
  <div id="flash"></div>

  <!-- Logo -->
  <div id="logo-container">
    <h1 id="logo">PELISXMAX</h1>
    <p id="tagline">El universo del cine en tus manos</p>
  </div>

  <!-- Audio de impacto -->
  <audio id="impacto" src="{{ url_for('static', filename='audio/impacto.mp3') }}" preload="auto"></audio>

  <script src="{{ url_for('static', filename='js/intro.js') }}"></script>
</body>
</html>
