<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — PELISXMAX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
  <style>
    .registro-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a0033 0%, #050505 70%);
      padding: 100px 20px 40px;
    }
    .registro-card {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }
    .registro-card h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #e0e0e0;
      text-align: center;
    }
    .registro-card p {
      color: #888;
      text-align: center;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #ff4d00;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .btn-registrar {
      width: 100%;
      background: #ff4d00;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.3s;
    }
    .btn-registrar:hover { background: #ff6a00; }
    .mensaje-exito {
      display: none;
      background: #0a2a0a;
      border: 1px solid #2a5a2a;
      color: #4caf50;
      padding: 14px;
      border-radius: 6px;
      text-align: center;
      margin-top: 16px;
      font-size: 0.9rem;
    }
    .link-login {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #888;
    }
    .link-login a { color: #ff4d00; text-decoration: none; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">PELISXMAX</div>
    <div class="nav-links">
      <a href="/home">Inicio</a>
      <a href="#catalogo">Catálogo</a>
    </div>
  </nav>

  <div class="registro-container">
    <div class="registro-card">
      <h2>Crear cuenta</h2>
      <p>Únete a PELISXMAX y disfruta el mejor contenido</p>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="nombre" placeholder="Carlos">
        </div>
        <div class="form-group">
          <label>Apellido Paterno</label>
          <input type="text" id="apepat" placeholder="Quispe">
        </div>
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="correo" placeholder="carlos@email.com">
      </div>

      <div class="form-group">
        <label>Distrito</label>
        <select id="distrito">
          <option value="">Selecciona tu distrito</option>
          <option>Miraflores</option>
          <option>San Isidro</option>
          <option>Surco</option>
          <option>La Molina</option>
          <option>Barranco</option>
          <option>Pueblo Libre</option>
          <option>Jesus Maria</option>
          <option>Lince</option>
          <option>San Borja</option>
          <option>Chorrillos</option>
          <option>San Miguel</option>
          <option>Magdalena</option>
          <option>Los Olivos</option>
          <option>San Martin de Porres</option>
        </select>
      </div>

      <button class="btn-registrar" onclick="registrar()">
        Crear cuenta
      </button>

      <div class="mensaje-exito" id="mensaje-exito">
        ✅ ¡Cuenta creada exitosamente! Redirigiendo a planes...
      </div>

      <div class="link-login">
        ¿Ya tienes cuenta? <a href="/home">Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
    async function registrar() {
      const nombre   = document.getElementById('nombre').value.trim();
      const apepat   = document.getElementById('apepat').value.trim();
      const correo   = document.getElementById('correo').value.trim();
      const distrito = document.getElementById('distrito').value;

      if (!nombre || !apepat || !correo || !distrito) {
        alert('Por favor completa todos los campos.');
        return;
      }

      try {
        const response = await fetch('/registro/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre, apepat, correo, distrito,
            fechaAlta: new Date().toISOString().split('T')[0]
          })
        });

        const resultado = await response.json();
        document.getElementById('mensaje-exito').style.display = 'block';

        setTimeout(() => {
          window.location.href = '/suscripcion?idUsuario=' + resultado.idUsuario;
        }, 2000);

      } catch (error) {
        alert('Error al registrar. Intenta de nuevo.');
      }
    }
  </script>

</body>
</html>
